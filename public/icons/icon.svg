<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="lipsGrad" x1="256" y1="168" x2="256" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E3AD43"/>
      <stop offset="0.35" stop-color="#D4960A"/>
      <stop offset="0.7" stop-color="#795548"/>
      <stop offset="1" stop-color="#5D4037"/>
    </linearGradient>
    <radialGradient id="mouthGrad" cx="256" cy="270" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1210"/>
      <stop offset="0.7" stop-color="#211A16"/>
      <stop offset="1" stop-color="#2C2320"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Scale the 108-unit logo to fit centered in 512px (scale ~3.5x, offset to center) -->
  <g transform="translate(67, 67) scale(3.5)">
    <!-- LIPS — Soft outer glow -->
    <path d="M22,65 C22,52 32,43 43,48 C49,51 52,58.5 54,58 C56,57.5 59,50 65,48 C76,43 86,53 86,65 C86,76 72,86 54,86 C36,86 22,76 22,65 Z" fill="#E3AD43" fill-opacity="0.22"/>
    <!-- LIPS — Main outer shape -->
    <path d="M26,65 C26,55 34,46.5 43,50 C48,52.5 52,58 54,57.5 C56,57 60,51.5 65,50 C74,46.5 82,55 82,65 C82,74 70,82 54,82 C38,82 26,74 26,65 Z" fill="url(#lipsGrad)"/>
    <!-- LIPS — Mouth interior -->
    <path d="M32,65 C32,59.5 42,55 54,55 C66,55 76,59.5 76,65 C76,70 66,74.5 54,74.5 C42,74.5 32,70 32,65 Z" fill="url(#mouthGrad)"/>
    <!-- Teeth hint -->
    <path d="M39,58.5 Q46,56 54,56 Q62,56 69,58.5" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" fill="none" stroke-opacity="0.40"/>
    <!-- Highlight sheens -->
    <path d="M36,55 C40,51 45,50.5 43,54" stroke="#FFF5CC" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <path d="M65,50.5 C69,51.5 72,54 69,55.5" stroke="#FFF5CC" stroke-width="1.2" stroke-linecap="round" fill="none" stroke-opacity="0.6"/>
    <path d="M43,77 C49,80 59,80 65,77" stroke="#D4960A" stroke-width="1" stroke-linecap="round" fill="none" stroke-opacity="0.35"/>
    <!-- "J" MUSICAL NOTE — left -->
    <path d="M27,43 C25,39 34,37 36,41 C38,45 29,47 27,43 Z" fill="#FFFFFF"/>
    <path d="M36.5,41 L36.5,20" stroke="#FFFFFF" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M36.5,20 C46,23.5 48,31 42,37" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- "j" MUSICAL NOTE — right -->
    <circle cx="72" cy="17" r="3" fill="#FFFFFF"/>
    <path d="M63,43 C61,39.5 69,37.5 71,41 C73,44.5 65,46.5 63,43 Z" fill="#FFFFFF"/>
    <path d="M71.5,41 L71.5,23" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <path d="M71.5,23 C79,26 81,32 76,37" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- SOUND ARCS -->
    <path d="M22,59 Q16,65 22,71" stroke="#557767" stroke-width="1.8" stroke-linecap="round" fill="none" stroke-opacity="0.70"/>
    <path d="M18,55 Q10,65 18,75" stroke="#557767" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.40"/>
    <!-- SPARKLES -->
    <path d="M54,22 L54.8,20.2 L56.5,19.5 L54.8,18.8 L54,17 L53.2,18.8 L51.5,19.5 L53.2,20.2 Z" fill="#557767" fill-opacity="0.85"/>
    <path d="M86,55 L86.7,53.3 L88.5,52.5 L86.7,51.7 L86,50 L85.3,51.7 L83.5,52.5 L85.3,53.3 Z" fill="#E3AD43" fill-opacity="0.70"/>
    <circle cx="85" cy="70" r="1.8" fill="#557767" fill-opacity="0.40"/>
    <circle cx="23" cy="78" r="1.5" fill="#FFFFFF" fill-opacity="0.30"/>
  </g>
</svg>
